<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTH 8182 Strateji</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background-color: #121212; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        #toolbar { padding: 0 20px; background: #1e1e1e; width: 100%; height: 75px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #bc13fe; box-sizing: border-box; z-index: 100; }
        #logo-section { display: flex; align-items: center; gap: 12px; }
        #team-logo { height: 50px; width: auto; filter: drop-shadow(0 0 5px #bc13fe); }
        #logo-section span { color: white; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; }
        .tab-container { display: flex; gap: 5px; background: #333; padding: 5px; border-radius: 8px; }
        .tab-btn { padding: 10px 20px; background: transparent; color: #888; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #bc13fe; color: white; }
        .btn-group { display: flex; gap: 10px; }
        .btn-action { padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        #canvas-wrapper { position: relative; flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        canvas { position: absolute; background-color: white; box-shadow: 0 0 30px rgba(0,0,0,0.7); touch-action: none; display: none; }
        canvas.active { display: block; }
        img#field-img { display: none; }
    </style>
</head>
<body>

    <div id="toolbar">
        <div id="logo-section">
            <img src="logo.png" id="team-logo" alt="LOTH">
            <span>LOTH 8182</span>
        </div>
        <div class="tab-container">
            <button id="btn-auto" class="tab-btn active" onclick="switchTab('auto')">OTONOM</button>
            <button id="btn-teleop" class="tab-btn" onclick="switchTab('teleop')">TELEOP</button>
        </div>
        <div class="btn-group">
            <button class="btn-action" style="background:#444; color:white; border:1px solid #bc13fe" onclick="changeColor()">Renk: <span id="color-text" style="color:#bc13fe">Mor</span></button>
            <button class="btn-action" style="background:#ff4d4d; color:white" onclick="clearCurrentCanvas()">Temizle</button>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="canvas-auto" class="active"></canvas>
        <canvas id="canvas-teleop"></canvas>
    </div>

    <img id="field-img" src="206e9d4c4e4694182931687e446909883ab232f3.png" crossorigin="anonymous">

    <script>
        const img = document.getElementById('field-img');
        const colorText = document.getElementById('color-text');
        const canvases = {
            auto: { el: document.getElementById('canvas-auto'), ctx: document.getElementById('canvas-auto').getContext('2d'), drawings: [] },
            teleop: { el: document.getElementById('canvas-teleop'), ctx: document.getElementById('canvas-teleop').getContext('2d'), drawings: [] }
        };

        let currentMode = 'auto';
        let drawing = false;
        let colors = ['#bc13fe', '#000000', '#007bff','#8f0801'];
        let colorNames = ['Mor', 'Siyah', 'Mavi','Kırmızı'];
        let colorIndex = 0;

        // Sistemi başlatma (Resim yüklense de yüklenmese de çalışır)
        function init() {
            Object.keys(canvases).forEach(setupCanvas);
        }

        img.onload = init;
        img.onerror = () => {
            console.error("Görsel yüklenemedi, beyaz tahta moduna geçiliyor.");
            init();
        };
        if (img.complete) init();
        window.onresize = init;

        function setupCanvas(mode) {
            const wrapper = document.getElementById('canvas-wrapper');
            const target = canvases[mode];
            const maxWidth = wrapper.clientWidth - 40;
            const maxHeight = wrapper.clientHeight - 40;
            
            // Eğer resim yüklenmediyse 4:3 oranında bir alan oluştur
            const iWidth = img.naturalWidth || 4;
            const iHeight = img.naturalHeight || 3;
            const imgRatio = iWidth / iHeight;

            if (maxWidth / maxHeight > imgRatio) {
                target.el.height = maxHeight;
                target.el.width = maxHeight * imgRatio;
            } else {
                target.el.width = maxWidth;
                target.el.height = maxWidth / imgRatio;
            }
            drawBackground(mode);
        }

        function drawBackground(mode) {
            const target = canvases[mode];
            target.ctx.fillStyle = "white";
            target.ctx.fillRect(0, 0, target.el.width, target.el.height);
            
            if (img.complete && img.naturalWidth > 0) {
                target.ctx.drawImage(img, 0, 0, target.el.width, target.el.height);
            }
        }

        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            document.querySelectorAll('canvas').forEach(c => c.classList.remove('active'));
            canvases[mode].el.classList.add('active');
        }

        function changeColor() {
            colorIndex = (colorIndex + 1) % colors.length;
            colorText.innerText = colorNames[colorIndex];
            colorText.style.color = colors[colorIndex];
        }

        function clearCurrentCanvas() {
            drawBackground(currentMode);
        }

        // Çizim Mekanizması
        function getPos(e) {
            const rect = canvases[currentMode].el.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return {
                x: (clientX - rect.left) * (canvases[currentMode].el.width / rect.width),
                y: (clientY - rect.top) * (canvases[currentMode].el.height / rect.height)
            };
        }

        function startDrawing(e) {
            drawing = true;
            const pos = getPos(e);
            canvases[currentMode].ctx.beginPath();
            canvases[currentMode].ctx.moveTo(pos.x, pos.y);
            if(e.cancelable) e.preventDefault();
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            const ctx = canvases[currentMode].ctx;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colors[colorIndex];
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            if(e.cancelable) e.preventDefault();
        }

        Object.values(canvases).forEach(obj => {
            obj.el.addEventListener('mousedown', startDrawing);
            obj.el.addEventListener('mousemove', draw);
            obj.el.addEventListener('touchstart', startDrawing, {passive: false});
            obj.el.addEventListener('touchmove', draw, {passive: false});
        });

        window.addEventListener('mouseup', () => drawing = false);
        window.addEventListener('touchend', () => drawing = false);
    </script>
</body>
</html>
