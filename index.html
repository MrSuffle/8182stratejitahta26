<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strateji Planlama Tahtası</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow: hidden;
        }

        #toolbar {
            padding: 10px;
            background: #333;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-clear { background: #ff4d4d; color: white; }
        .btn-clear:hover { background: #cc0000; }

        .btn-color { background: #4CAF50; color: white; }
        .btn-color:hover { background: #45a049; }

       #canvas-container {
            position: relative;
            margin-top: 5px;
            width: 98vw;
            /* Ekran yüksekliğinden üstteki menü barının (yaklaşık 60px) payını çıkarıyoruz */
            height: calc(100vh - 70px); 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden; /* Kaydırma çubuklarını tamamen kaldırır */
        }

        canvas {
            /* Hem genişlik hem yükseklik için hangisi önce dolarsa ona göre sığdırır */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            display: block;
            cursor: crosshair;
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            touch-action: none;
        }

        #field-img {
            display: none; /* Arka planda yüklenmesi için */
        }
    </style>
</head>
<body>

    <div id="toolbar">
    <button class="btn-color" onclick="changeColor()">Renk Değiştir</button>
    <button class="btn-clear" onclick="clearCanvas()">Ekranı Temizle</button>
    <span style="color: white; line-height: 35px;">Aktif Renk: <b id="color-indicator" style="color: purple;">Mor</b></span>
</div>

    <div id="canvas-container">
        <canvas id="strategyCanvas"></canvas>
    </div>

    <img id="field-img" src="206e9d4c4e4694182931687e446909883ab232f3.png" alt="Saha">

    <script>
        const canvas = document.getElementById('strategyCanvas');
        const ctx = canvas.getContext('2d');
        const img = document.getElementById('field-img');
        const colorIndicator = document.getElementById('color-indicator');

        let drawing = false;
        // İstediğin renkleri buraya ekledik
        let colors = ['purple', 'black', 'blue']; 
        let colorNames = ['Mor', 'Siyah', 'Mavi'];
        let colorIndex = 0;

        // Renk değiştirme fonksiyonu
        function changeColor() {
            colorIndex = (colorIndex + 1) % colors.length;
            const activeColor = colors[colorIndex];
            const activeName = colorNames[colorIndex];
            
            colorIndicator.innerText = activeName;
            colorIndicator.style.color = activeColor;
            
            // Siyah renk koyu gri arka planda görünmezse diye beyaz gölge ekleyelim
            if(activeColor === 'black') {
                colorIndicator.style.textShadow = "1px 1px 0px white";
            } else {
                colorIndicator.style.textShadow = "none";
            }
        }

        // Görsel yüklendiğinde canvas boyutlarını ayarla
        img.onload = function() {
            setupCanvas();
        };

      function setupCanvas() {
            const container = document.getElementById('canvas-container');
            const maxWidth = container.clientWidth;
            const maxHeight = container.clientHeight;
            
            const imgRatio = img.width / img.height;
            const containerRatio = maxWidth / maxHeight;

            if (imgRatio > containerRatio) {
                // Resim container'dan daha genişse
                canvas.width = maxWidth;
                canvas.height = maxWidth / imgRatio;
            } else {
                // Resim container'dan daha uzunsa
                canvas.height = maxHeight;
                canvas.width = maxHeight * imgRatio;
            }

            drawBackground();
        }

        function drawBackground() {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }

        // Pencere boyutu değiştiğinde resmi tekrar boyutlandır (Responsive olması için)
        window.addEventListener('resize', setupCanvas);

        // Çizim İşlemleri
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        function startDrawing(e) {
            drawing = true;
            draw(e); 
        }

        function draw(e) {
            if (!drawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colors[colorIndex];

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function stopDrawing() {
            drawing = false;
            ctx.beginPath();
        }

        // Buton Fonksiyonları
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
        }

        function changeColor() {
            colorIndex = (colorIndex + 1) % colors.length;
            const activeColor = colors[colorIndex];
            colorIndicator.innerText = activeColor.charAt(0).toUpperCase() + activeColor.slice(1);
            colorIndicator.style.color = activeColor;
        }
    </script>

</body>
</html>
