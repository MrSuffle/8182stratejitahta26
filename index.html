<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTH Strateji</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background-color: #121212; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        
        #toolbar { 
            padding: 0 20px; 
            background: #1e1e1e; 
            width: 100%; 
            height: 75px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #bc13fe; 
            box-sizing: border-box; 
            z-index: 100; 
        }

        #logo-section { 
            display: flex; 
            align-items: center; 
            gap: 12px;
            min-width: 200px;
        }

        #team-logo { 
            height: 55px; 
            width: auto;
            filter: drop-shadow(0 0 5px #bc13fe); 
        }

        #logo-section span { color: white; font-weight: bold; font-size: 1.3rem; letter-spacing: 2px; }

        .tab-container { display: flex; gap: 5px; background: #333; padding: 5px; border-radius: 8px; }
        .tab-btn { padding: 10px 20px; background: transparent; color: #888; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #bc13fe; color: white; }

        .btn-group { display: flex; gap: 10px; align-items: center; }
        .btn-action { padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        
        #canvas-wrapper { position: relative; flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; }
        
        canvas { 
            position: absolute; 
            background-color: white; 
            box-shadow: 0 0 25px rgba(0,0,0,0.6); 
            touch-action: none; 
            display: none; 
        }
        canvas.active { display: block; }
        
        #field-img { display: none; }

        @media (max-width: 768px) {
            #logo-section span { display: none; }
            #logo-section { min-width: auto; }
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <div id="logo-section">
            <img src="logo.png" id="team-logo" alt="LOTH Logo">
            <span>LOTH 8182</span>
        </div>

        <div class="tab-container">
            <button id="btn-auto" class="tab-btn active" onclick="switchTab('auto')">OTONOM</button>
            <button id="btn-teleop" class="tab-btn" onclick="switchTab('teleop')">TELEOP</button>
        </div>

        <div class="btn-group">
            <button class="btn-action" style="background:#444; color:white; border:1px solid #bc13fe" onclick="changeColor()">
                Renk: <span id="color-text" style="color:#bc13fe">Mor</span>
            </button>
            <button class="btn-action" style="background:#ff4d4d; color:white" onclick="clearCurrentCanvas()">Temizle</button>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="canvas-auto" class="active"></canvas>
        <canvas id="canvas-teleop"></canvas>
    </div>
